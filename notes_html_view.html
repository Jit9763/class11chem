<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>नोट्स - प्रीमियम HTML व्यू</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .page-container {
            max-width: 900px;
            margin: 40px auto;
            background: white;
            color: #1a202c;
            padding: 60px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .nav-back {
            margin-bottom: 20px;
            display: inline-block;
            color: var(--accent-color);
            text-decoration: none;
            font-weight: bold;
        }
        .loading {
            text-align: center;
            padding: 100px;
            font-size: 1.5rem;
        }

        /* Action Bar for Copy/Print - Changed to absolute to scroll with content */
        .action-bar {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 1100;
        }

        .action-btn {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            border: 2px solid #3b82f6;
            background: #1e293b;
            color: white;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .action-btn:hover {
            transform: scale(1.1);
            background: #3b82f6;
        }

        .btn-copy.success {
            background: #059669;
            border-color: #10b981;
        }

        @media print {
            .bg-animation,
            .floating-home-btn,
            .action-bar {
                display: none !important;
            }
            body {
                background: white !important;
                margin: 0;
                padding: 0;
            }
            .container {
                padding: 0;
                margin: 0;
            }
            .page-container {
                width: 100% !important;
                max-width: none !important;
                box-shadow: none !important;
                margin: 0 !important;
                padding: 20px !important;
                border-radius: 0 !important;
                background: white !important;
            }
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    <div class="container" style="position: relative;">
        <!-- Floating Home Button -->
        <a href="index.html" class="floating-home-btn" style="position: fixed; bottom: 30px; left: 30px; z-index: 1000; background: #1e293b; color: white; padding: 15px; border-radius: 50px; text-decoration: none; font-weight: bold; box-shadow: 0 10px 20px rgba(0,0,0,0.3); border: 2px solid #3b82f6; display: flex; align-items: center; justify-content: center; font-size: 1.5rem;">🏠</a>

        <div class="page-container" style="position: relative;">
            <div class="action-bar">
                <button id="floatingCopyBtn" class="action-btn btn-copy" onclick="copyEntireContent()" title="Copy for Google Docs">📋</button>
                <button class="action-btn" onclick="window.print()" title="Print / Save as PDF">🖨️</button>
            </div>

            <div id="notes-content">
                <div class="loading">नोट्स लोड हो रहे हैं... (50 पन्ने)</div>
            </div>
        </div>
    </div>

    <script>
        async function copyEntireContent() {
            const btn = document.getElementById('floatingCopyBtn');
            const target = document.getElementById('notes-content');

            // Clone the content to modify it for copying
            const clone = target.cloneNode(true);

            // CRITICAL: Convert all relative image paths to Absolute URLs
            // This ensures Google Docs can find the images on your public GitHub Pages
            const images = clone.querySelectorAll('img');
            images.forEach(img => {
                // img.src in JS automatically returns the full absolute URL
                img.setAttribute('src', img.src);
            });

            const content = clone.innerHTML;

            try {
                // Ensure images use absolute URLs for docs sync
                const blob = new Blob([content], { type: 'text/html' });
                const item = new ClipboardItem({ 'text/html': blob });
                await navigator.clipboard.write([item]);

                btn.innerText = '✅';
                btn.classList.add('success');

                setTimeout(() => {
                    btn.innerText = '📋';
                    btn.classList.remove('success');
                }, 3000);
            } catch (err) {
                alert('Copy failed: ' + err);
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');

            if (id && parseInt(id) >= 1 && parseInt(id) <= 9) {
                // Fetch the specialized 50-page Copy Master content for the selected chapter
                try {
                    const response = await fetch(`copy_master_ch${id}.html`);
                    if (!response.ok) throw new Error('File not found');

                    const html = await response.text();

                    // Extract only the content inside #contentToCopy
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(html, 'text/html');
                    const content = doc.getElementById('contentToCopy');

                    if (content) {
                        document.getElementById('notes-content').innerHTML = content.innerHTML;
                        document.title = "नोट्स - चैप्टर " + id;
                    } else {
                        document.getElementById('notes-content').innerHTML = "<p>त्रुटि: नोट्स प्राप्त नहीं हो सके।</p>";
                    }
                } catch (err) {
                    document.getElementById('notes-content').innerHTML = `<p>त्रुटि: चैप्टर ${id} के नोट्स अभी उपलब्ध नहीं हैं।</p>`;
                }
            } else {
                document.getElementById('notes-content').innerHTML = "<h3>चैप्टर " + (id || "") + " के लिए प्रीमियम HTML व्यू जल्द ही आ रहा है!</h3><p>कृपया अभी के लिए अन्य चैप्टर्स को आज़माएँ।</p>";
            }
        });
    </script>
</body>
</html>
