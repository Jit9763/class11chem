<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>प्रीमियम नोट्स व्यू - रसायन विज्ञान</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body {
            background: #022c22; /* Specific dark green background for viewing */
        }
        .page-container {
            max-width: 1000px;
            margin: 40px auto;
            background: white;
            color: #1a202c;
            padding: 80px;
            border-radius: 40px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.6);
            position: relative;
        }
        
        /* Hide scrollbar for cleaner look during presentations */
        ::-webkit-scrollbar {
            display: none;
        }

        @media print {
            .bg-animation,
            .floating-sidebar {
                display: none !important;
            }
            body {
                background: white !important;
            }
            .page-container {
                width: 100% !important;
                max-width: none !important;
                box-shadow: none !important;
                margin: 0 !important;
                padding: 40px !important;
                border-radius: 0 !important;
            }
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>

    <!-- Premium Floating Sidebar -->
    <div class="floating-sidebar" id="mainSidebar">
        <a href="index.html" class="sidebar-btn" title="Home">🏠</a>
        <button id="floatingCopyBtn" class="sidebar-btn" onclick="copyEntireContent()" title="Copy for Google Docs">📋</button>
        <button class="sidebar-btn" onclick="window.print()" title="Print / Save as PDF">🖨️</button>
    </div>

    <div class="container">
        <div class="page-container">
            <div id="notes-content">
                <div style="text-align: center; padding: 100px; font-size: 1.5rem; color: #64748b;">
                    ✨ प्रीमियम सामग्री लोड हो रही है...
                </div>
            </div>
        </div>
    </div>

    <script src="js/simulators.js"></script>
    <script>
        // Sidebar Hide on Scroll Logic
        let lastScrollY = window.scrollY;
        const sidebar = document.getElementById('mainSidebar');

        window.addEventListener('scroll', () => {
            if (window.scrollY > lastScrollY && window.scrollY > 100) {
                sidebar.classList.add('hidden');
            } else {
                sidebar.classList.remove('hidden');
            }
            lastScrollY = window.scrollY;
        });

        async function copyEntireContent() {
            const btn = document.getElementById('floatingCopyBtn');
            const target = document.getElementById('notes-content');

            // Clone content and handle absolute image paths
            const clone = target.cloneNode(true);
            const images = clone.querySelectorAll('img');
            images.forEach(img => {
                img.setAttribute('src', img.src);
            });

            // Remove interactive script tags from copy for cleaner paste in Docs
            const scripts = clone.querySelectorAll('script');
            scripts.forEach(s => s.remove());

            const content = clone.innerHTML;

            try {
                const blob = new Blob([content], { type: 'text/html' });
                const item = new ClipboardItem({ 'text/html': blob });
                await navigator.clipboard.write([item]);

                btn.classList.add('success');
                btn.innerHTML = '✅';

                setTimeout(() => {
                    btn.classList.remove('success');
                    btn.innerHTML = '📋';
                }, 3000);
            } catch (err) {
                alert('Copy failed. Please try again.');
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');

            if (id) {
                try {
                    // Add timestamp to bypass GitHub Pages/Browser CDN Cache
                    const timestamp = new Date().getTime();
                    const response = await fetch(`copy_master_ch${id}.html?v=${timestamp}`);
                    if (!response.ok) throw new Error();

                    const html = await response.text();
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(html, 'text/html');
                    const content = doc.getElementById('contentToCopy');

                    if (content) {
                        document.getElementById('notes-content').innerHTML = content.innerHTML;
                        document.title = "Chapter " + id + " - Premium Notes";
                        
                        // Execute internal scripts if any (for simulator logic)
                        const scripts = document.getElementById('notes-content').getElementsByTagName('script');
                        for (let n = 0; n < scripts.length; n++) {
                            eval(scripts[n].innerText);
                        }
                    } else {
                        document.getElementById('notes-content').innerHTML = "<p>Content Master not found.</p>";
                    }
                } catch (err) {
                    document.getElementById('notes-content').innerHTML = `<h3>Chapter ${id} Coming Soon!</h3>`;
                }
            }
        });
    </script>
</body>
</html>
